services:
  voicebox:
    build: .
    container_name: voicebox-fork
    restart: unless-stopped
    ports:
      - "${HOST_PORT}:17493"
    volumes:
      - ${VOLUME_GENERATIONS}:/app/data/generations
      - voicebox-data:/app/data
      - huggingface-cache:/home/voicebox/.cache/huggingface
    environment:
      - LOG_LEVEL=info
      - NUMBA_CACHE_DIR=/tmp/numba_cache
      - VOICEBOX_CORS_ORIGINS=${ALLOWED_ORIGINS}
    networks:
      - voicebox-net
    devices:
      - /dev/dri:/dev/dri
      - /dev/dri/renderD128:/dev/dri/renderD128
    deploy:
      resources:
        limits:
          cpus: '8'
          memory: 16G

networks:
  voicebox-net:
    driver: bridge

volumes:
  voicebox-data:
  huggingface-cache:
