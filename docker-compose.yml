services:
  voicebox:
    build: .
    container_name: voicebox
    restart: unless-stopped
    network_mode: "host"
    ports:
      - "${HOST_PORT}:17493"
    volumes:
      - ${VOLUME_GENERATIONS}:/app/data/generations
      - ${VOLUME_DATA}:/app/data
      - ${VOLUME_MODEL_CACHE}:/home/voicebox/.cache/huggingfac
    environment:
      - LOG_LEVEL=info
      - NUMBA_CACHE_DIR=/tmp/numba_cache
      - VOICEBOX_CORS_ORIGINS=${ALLOWED_ORIGINS}
    devices:
      - /dev/dri:/dev/dri
      - /dev/dri/renderD128:/dev/dri/renderD128
    deploy:
      resources:
        limits:
          cpus: '8'
          memory: 16G
